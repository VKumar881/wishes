<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Vikas Jaiswal!</title>
    <style>
        :root {
            --primary-pink: #ff007f;
            --bg-black: #000000;
            --text-pink: #ff80bf;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-black);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #fwCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            width: 95%;
            max-width: 800px;
            z-index: 5;
            position: relative;
        }

        .step {
            display: none;
            animation: fadeIn 0.8s ease-in-out;
        }

        .step.active {
            display: block;
        }

        h1 { 
            font-size: 2.5rem; 
            color: var(--primary-pink);
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.7); 
        }

        .btn {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            margin-top: 20px;
        }

        .btn:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--primary-pink); }

        .cake-wrapper { position: relative; display: inline-block; cursor: pointer; margin: 20px 0; }
        .cake-emoji { font-size: 100px; filter: drop-shadow(0 0 10px var(--primary-pink)); }
        .knife-emoji { position: absolute; top: -20px; right: -30px; font-size: 50px; animation: slice 2s infinite; }
        
        @keyframes slice {
            0%, 100% { transform: rotate(-45deg) translate(0,0); }
            50% { transform: rotate(-45deg) translate(-20px, 20px); }
        }

        /* --- THE HANGING FORMATION --- */
        .hanging-gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .arch-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            position: relative;
        }

        .circle-frame {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--white);
            overflow: hidden;
            box-shadow: 0 0 20px var(--primary-pink);
        }

        .arch-row .circle-frame:nth-child(2) {
            transform: translateY(-30px);
            width: 120px;
            height: 120px;
            border-color: var(--primary-pink);
        }

        .circle-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* ADJUSTING IMAGE 2 DOWNWARDS */
        .adj-down {
            object-position: center 20%; /* Change 20% to 30% or 40% to move it further down */
        }

        .hanging-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 5px solid var(--white);
            padding-top: 30px;
            position: relative;
            width: 100%;
        }

        .hanging-frame {
            width: 110px;
            height: 140px;
            background: var(--white);
            padding: 6px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            transition: 0.4s;
        }

        .hanging-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

        .hanging-frame::before {
            content: "";
            position: absolute;
            top: -35px;
            left: 50%;
            width: 3px;
            height: 30px;
            background: var(--white);
        }

        .heart {
            position: absolute;
            color: #ff0000;
            font-size: 22px;
            top: -15px;
            left: -10px;
            z-index: 10;
            filter: drop-shadow(0 0 5px white);
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 45px;
            height: 60px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            z-index: 2;
            animation: floatUp 8s ease-in forwards;
        }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: rgba(255,255,255,0.3);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="fwCanvas"></canvas>

    <audio id="birthdayMusic" loop>
        <source src="https://raw.githubusercontent.com/VKumar881/wishes/main/Vikash.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="step active" id="step1">
            <h1>Happy Birthday, Vikas Jaiswal!</h1>
            <p>Ready for your digital surprise, Brother?</p>
            <button class="btn" onclick="nextStep(2)">Start the Journey 🎁</button>
        </div>

        <div class="step" id="step2">
            <h1>Make a Wish!</h1>
            <div class="cake-wrapper" onclick="cutCake()">
                <div class="knife-emoji">🔪</div>
                <div class="cake-emoji">🎂</div>
            </div>
            <p>Tap the cake to cut it</p>
        </div>

        <div class="step" id="step3">
            <h1>It's getting dark...</h1>
            <button class="btn" onclick="turnOnLights()">Light Up the Sky 💡</button>
        </div>

        <div class="step" id="step4">
            <h1>Let the colors fly!</h1>
            <button class="btn" onclick="flyBalloons()">Release the Magic 🎈</button>
        </div>

        <div class="step" id="step5">
            <h2 style="color: var(--primary-pink); margin-bottom: 0;">Our Best Memories</h2>
            <div class="hanging-gallery">
                <div class="arch-row">
                    <div class="circle-frame"><img src="https://raw.githubusercontent.com/VKumar881/wishes/main/1.jpeg"></div>
                    <div class="circle-frame"><img src="https://raw.githubusercontent.com/VKumar881/wishes/main/2.jpg" class="adj-down"></div>
                    <div class="circle-frame"><img src="https://raw.githubusercontent.com/VKumar881/wishes/main/3.JPG"></div>
                </div>

                <div class="hanging-row">
                    <div class="hanging-frame"><span class="heart">❤️</span><img src="https://raw.githubusercontent.com/VKumar881/wishes/main/4.jpg"></div>
                    <div class="hanging-frame" style="margin-top: 30px;"><img src="https://raw.githubusercontent.com/VKumar881/wishes/main/5.jpeg"></div>
                    <div class="hanging-frame"><span class="heart">❤️</span><img src="https://raw.githubusercontent.com/VKumar881/wishes/main/6.jpeg"></div>
                    <div class="hanging-frame" style="margin-top: 30px;"><img src="https://raw.githubusercontent.com/VKumar881/wishes/main/7.jpeg"></div>
                    <div class="hanging-frame"><span class="heart">❤️</span><img src="https://raw.githubusercontent.com/VKumar881/wishes/main/8.jpeg"></div>
                </div>
            </div>
            <h3 style="color: var(--primary-pink); margin-top: 40px;">Happy Birthday Vikas Jaiswal! 🍻</h3>
        </div>
    </div>

    <script>
        const music = document.getElementById('birthdayMusic');
        const canvas = document.getElementById('fwCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
                this.alpha = 1;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() { this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.012; }
        }

        function createFirework(x, y) {
            const colors = ['#ff007f', '#ffffff', '#00f2ff', '#ffff00'];
            for (let i = 0; i < 50; i++) particles.push(new Particle(x, y, colors[Math.floor(Math.random()*colors.length)]));
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { if (p.alpha > 0) { p.update(); p.draw(); } else { particles.splice(i, 1); } });
            requestAnimationFrame(animate);
        }

        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
        }

        function cutCake() { music.play(); nextStep(3); }

        function turnOnLights() {
            animate();
            setInterval(() => createFirework(Math.random()*canvas.width, Math.random()*canvas.height*0.5), 700);
            nextStep(4);
        }

        function flyBalloons() {
            const colors = ['#ff007f', '#00f2ff', '#ffffff', '#ffff00', '#ff80bf'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    let b = document.createElement('div');
                    b.className = 'balloon';
                    b.style.left = Math.random() * 95 + 'vw';
                    b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    document.body.appendChild(b);
                }, i * 150);
            }
            setTimeout(() => nextStep(5), 5000);
        }
    </script>
</body>
</html>
